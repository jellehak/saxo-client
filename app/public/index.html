<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Trader - Saxo Client</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app"></div>

  <script type="importmap">
    {
      "imports": {
        "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js"
      }
    }
  </script>

  <script type="module">
    import { createApp, ref, onMounted, watch } from 'vue';
    import { createClient } from './saxo-client.js';

    const app = createApp({
      setup() {
        const token = ref('');
        const tokenVisible = ref(false);
        const balance = ref(null);
        const positions = ref([]);
        const orders = ref([]);
        const transactions = ref([]);
        const loading = ref(false);
        const actionLoading = ref({});
        const results = ref('');
        const priceLoading = ref({});

        onMounted(() => {
          const savedToken = localStorage.getItem('saxo-token');
          if (savedToken) {
            token.value = savedToken;
          }
        });

        watch(token, (newToken) => {
          if (newToken) {
            localStorage.setItem('saxo-token', newToken);
          } else {
            localStorage.removeItem('saxo-token');
          }
        });

        const positionUic = (position) => {
          if (position?.Uic != null) return position.Uic;
          if (position?.NetPositionBase?.Uic != null) return position.NetPositionBase.Uic;
          return null;
        };

        const positionAssetType = (position) => {
          if (position?.AssetType) return position.AssetType;
          if (position?.NetPositionBase?.AssetType) return position.NetPositionBase.AssetType;
          return 'FxSpot';
        };

        const positionName = (position) => {
          return (
            position?.DisplayAndFormat?.Description ||
            position?.DisplayAndFormat?.Symbol ||
            position?.Symbol ||
            `UIC ${positionUic(position)}`
          );
        };

        const positionStockAmount = (position) => {
          const amount =
            position?.NetPositionBase?.Amount ??
            position?.NetPositionView?.Amount ??
            position?.Amount ??
            position?.NetPosition ??
            position?.PositionBase?.Amount;

          if (amount == null || Number.isNaN(Number(amount))) {
            return 'N/A';
          }

          return Number(amount);
        };

        const positionAveragePrice = (position) => {
          const price = position?.NetPositionView?.PositionsAverageBuyPrice;
          if (price == null || Number.isNaN(Number(price))) return 'N/A';
          return Number(price).toFixed(2);
        };

        const positionCurrentPrice = (position) => {
          const price = position?.NetPositionView?.CurrentPrice;
          if (price == null || Number.isNaN(Number(price))) return 'N/A';
          return Number(price).toFixed(2);
        };

        const positionPnL = (position) => {
          const pnl = position?.NetPositionView?.ProfitLossOnTrade;
          if (pnl == null || Number.isNaN(Number(pnl))) return 'N/A';
          return Number(pnl).toFixed(2);
        };

        const positionTradeCosts = (position) => {
          const costs = position?.NetPositionView?.TradeCostsTotal;
          if (costs == null || Number.isNaN(Number(costs))) return 'N/A';
          return Number(costs).toFixed(2);
        };

        const positionStatus = (position) => {
          return position?.NetPositionView?.Status || 'Unknown';
        };

        const positionExposure = (position) => {
          const exposure = position?.NetPositionView?.Exposure;
          if (exposure == null || Number.isNaN(Number(exposure))) return 'N/A';
          return Number(exposure).toFixed(2);
        };

        const logResult = (data) => {
          results.value = JSON.stringify(data, null, 2);
        };

        const setError = (error) => {
          results.value = `Error: ${error.message}`;
        };

        const formatCurrency = (value, currency = 'EUR') => {
          if (value == null || Number.isNaN(Number(value))) return 'N/A';
          const num = Number(value);
          return new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: currency,
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          }).format(num);
        };

        const fetchPriceForPosition = async (position) => {
          try {
            const uic = positionUic(position);
            const assetType = positionAssetType(position);
            if (!uic) return null;

            const client = createClient(token.value);
            const result = await client.fetchInstrument(uic, assetType);
            
            if (Array.isArray(result) && result.length > 0) {
              const instrument = result[0];
              return {
                bid: instrument.Bid,
                ask: instrument.Ask,
                last: instrument.Last,
                mid: instrument.Mid,
              };
            }
            return null;
          } catch (error) {
            console.error('Error fetching price:', error);
            return null;
          }
        };

        const loadPortfolio = async () => {
          if (!token.value) {
            results.value = 'Please enter a Bearer token';
            return;
          }

          loading.value = true;
          try {
            const client = createClient(token.value);
            const [balanceResponse, portfolioResponse, ordersResponse, transactionsResponse] = await Promise.allSettled([
              client.getBalance(),
              client.listPortfolio(),
              client.listOrders(),
              client.listRecentTransactions({ Top: 20 }),
            ]);

            const balanceResult = balanceResponse.status === 'fulfilled' ? balanceResponse.value : null;
            const portfolioResult = portfolioResponse.status === 'fulfilled' ? portfolioResponse.value : null;
            const ordersResult = ordersResponse.status === 'fulfilled' ? ordersResponse.value : null;
            const transactionsResult = transactionsResponse.status === 'fulfilled' ? transactionsResponse.value : null;

            balance.value = balanceResult;
            positions.value = Array.isArray(portfolioResult) ? portfolioResult : [];
            orders.value = Array.isArray(ordersResult) ? ordersResult : [];
            transactions.value = Array.isArray(transactionsResult) ? transactionsResult : [];

            // Fetch prices for all positions
            if (positions.value.length > 0) {
              for (const position of positions.value) {
                const uic = positionUic(position);
                priceLoading.value[uic] = true;
                const price = await fetchPriceForPosition(position);
                position._price = price;
                priceLoading.value[uic] = false;
              }
            }

            logResult({
              balance: balanceResult,
              portfolio: portfolioResult,
              openOrders: ordersResult,
              recentTransactions: transactionsResult,
              warnings: {
                balance: balanceResponse.status === 'rejected' ? balanceResponse.reason?.message || 'Failed to load balance' : null,
                portfolio: portfolioResponse.status === 'rejected' ? portfolioResponse.reason?.message || 'Failed to load portfolio' : null,
                openOrders: ordersResponse.status === 'rejected' ? ordersResponse.reason?.message || 'Failed to load orders' : null,
                recentTransactions: transactionsResponse.status === 'rejected' ? transactionsResponse.reason?.message || 'Failed to load transactions' : null,
              },
            });
          } catch (error) {
            setError(error);
            balance.value = null;
            positions.value = [];
            orders.value = [];
            transactions.value = [];
          } finally {
            loading.value = false;
          }
        };

        const orderId = (order) => {
          return order?.OrderId ?? order?.OrderKey ?? 'Unknown';
        };

        const orderName = (order) => {
          return (
            order?.DisplayAndFormat?.Description ||
            order?.DisplayAndFormat?.Symbol ||
            order?.Symbol ||
            `Order ${orderId(order)}`
          );
        };

        const orderStatus = (order) => {
          return order?.Status || order?.OrderStatus || 'Unknown';
        };

        const orderSide = (order) => {
          return order?.BuySell || 'Unknown';
        };

        const orderAmount = (order) => {
          const amount = order?.Amount;
          if (amount == null || Number.isNaN(Number(amount))) return 'N/A';
          return Number(amount);
        };

        const transactionId = (transaction) => {
          return transaction?.ClosedPositionId ?? transaction?.PositionId ?? transaction?.TradeId ?? 'Unknown';
        };

        const transactionName = (transaction) => {
          return (
            transaction?.DisplayAndFormat?.Description ||
            transaction?.DisplayAndFormat?.Symbol ||
            transaction?.Symbol ||
            `Transaction ${transactionId(transaction)}`
          );
        };

        const transactionAmount = (transaction) => {
          const amount =
            transaction?.ClosedPosition?.Amount ??
            transaction?.Amount ??
            transaction?.NetPositionBase?.Amount;

          if (amount == null || Number.isNaN(Number(amount))) return 'N/A';
          return Number(amount);
        };

        const transactionPnl = (transaction) => {
          const pnl =
            transaction?.NetPositionView?.ProfitLossOnTrade ??
            transaction?.ProfitLossOnTrade ??
            transaction?.Pnl;

          if (pnl == null || Number.isNaN(Number(pnl))) return 'N/A';
          return Number(pnl);
        };

        const transactionDate = (transaction) => {
          return (
            transaction?.ClosedPosition?.ClosedDate ||
            transaction?.ClosedDate ||
            transaction?.ExecutionTime ||
            'Unknown'
          );
        };

        const submitTrade = async (position, side) => {
          const uic = positionUic(position);
          const assetType = positionAssetType(position);
          const stockAmount = positionStockAmount(position);
          const defaultAmount = side === 'sell' && Number.isFinite(Number(stockAmount))
            ? String(Math.max(1, Number(stockAmount)))
            : '1';
          const amountInput = window.prompt(`Enter amount to ${side} for ${positionName(position)}:`, defaultAmount);

          if (amountInput === null) {
            results.value = 'Trade cancelled';
            return;
          }

          const amount = parseInt(amountInput, 10);

          if (!token.value) {
            results.value = 'Please enter a Bearer token';
            return;
          }

          if (!uic) {
            results.value = 'Could not find UIC for this position';
            return;
          }

          if (!Number.isFinite(amount) || amount <= 0) {
            results.value = 'Quantity must be a positive number';
            return;
          }

          const key = `${side}-${uic}`;
          actionLoading.value = { ...actionLoading.value, [key]: true };

          try {
            const client = createClient(token.value);
            const payload = {
              Uic: Number(uic),
              AssetType: assetType,
              Amount: amount,
            };

            const result = side === 'buy'
              ? await client.buy(payload)
              : await client.sell(payload);

            logResult({
              action: side.toUpperCase(),
              instrument: positionName(position),
              payload,
              response: result,
            });
          } catch (error) {
            setError(error);
          } finally {
            actionLoading.value = { ...actionLoading.value, [key]: false };
          }
        };

        const isActionLoading = (side, position) => {
          const uic = positionUic(position);
          return Boolean(actionLoading.value[`${side}-${uic}`]);
        };

        const logout = () => {
          token.value = '';
          tokenVisible.value = false;
          balance.value = null;
          positions.value = [];
          orders.value = [];
          transactions.value = [];
          results.value = '';
        };

        return {
          token,
          tokenVisible,
          balance,
          positions,
          orders,
          transactions,
          results,
          loading,
          loadPortfolio,
          submitTrade,
          isActionLoading,
          formatCurrency,
          positionUic,
          positionAssetType,
          positionName,
          positionStockAmount,
          positionAveragePrice,
          positionCurrentPrice,
          positionPnL,
          positionTradeCosts,
          positionStatus,
          positionExposure,
          orderId,
          orderName,
          orderStatus,
          orderSide,
          orderAmount,
          transactionId,
          transactionName,
          transactionAmount,
          transactionPnl,
          transactionDate,
          logout,
        };
      },

      template: `
        <nav class="navbar">
          <div class="navbar-brand">
            <svg class="navbar-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
              <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="currentColor" stroke-width="2"/>
              <g transform="translate(50, 120)">
                <polyline points="0,50 20,35 40,45 60,20 80,30 100,5" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                <polygon points="100,5 90,15 100,20 110,15" fill="currentColor"/>
              </g>
              <g transform="translate(70, 60)">
                <rect x="10" y="15" width="50" height="35" rx="3" fill="none" stroke="currentColor" stroke-width="2.5"/>
                <path d="M 20 15 Q 35 0 50 15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="35" y1="15" x2="35" y2="50" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
              </g>
            </svg>
            <h1 class="navbar-title">Portfolio Trader</h1>
          </div>
          <div class="navbar-actions">
            <button 
              v-if="token"
              @click="loadPortfolio"
              :disabled="loading"
              aria-busy="loading"
              class="navbar-refresh"
            >
              Refresh
            </button>
            <button 
              v-if="token" 
              @click="logout"
              class="navbar-logout"
            >
              Logout
            </button>
          </div>
        </nav>

        <main class="container">
          <section class="section" v-if="!token || tokenVisible">
            <h2>Configuration</h2>
            <div class="token-input-container">
              <label>
                Bearer Token
                <input
                  v-model="token"
                  type="password"
                  placeholder="Your Saxo API token"
                />
              </label>
              <button
                v-if="tokenVisible"
                @click="tokenVisible = false"
                class="secondary"
              >
                Hide Token
              </button>
            </div>
          </section>

          <section class="section">
            <h2>Account Balance</h2>
            <div v-if="!balance" class="results" style="max-height: none;">
              Load portfolio to see balance information.
            </div>

            <div v-else class="balance-grid">
              <div class="balance-item">
                <div class="balance-item-label">Cash Balance</div>
                <div class="balance-item-value">{{ formatCurrency(balance.CashBalance, balance.Currency) }}</div>
              </div>
              <div class="balance-item">
                <div class="balance-item-label">Total Value</div>
                <div class="balance-item-value">{{ formatCurrency(balance.TotalValue, balance.Currency) }}</div>
              </div>
              <div class="balance-item">
                <div class="balance-item-label">Cash Available for Trading</div>
                <div class="balance-item-value">{{ formatCurrency(balance.CashAvailableForTrading, balance.Currency) }}</div>
              </div>
              <div class="balance-item">
                <div class="balance-item-label">Margin Available</div>
                <div class="balance-item-value">{{ formatCurrency(balance.MarginAvailableForTrading, balance.Currency) }}</div>
              </div>
              <div class="balance-item">
                <div class="balance-item-label">Collateral Available</div>
                <div class="balance-item-value">{{ formatCurrency(balance.CollateralAvailable, balance.Currency) }}</div>
              </div>
              <div class="balance-item">
                <div class="balance-item-label">Net Equity for Margin</div>
                <div class="balance-item-value">{{ formatCurrency(balance.NetEquityForMargin, balance.Currency) }}</div>
              </div>
              <div class="balance-item">
                <div class="balance-item-label">Unrealized P/L</div>
                <div class="balance-item-value" :class="balance.UnrealizedMarginProfitLoss >= 0 ? 'positive' : 'negative'">
                  {{ formatCurrency(balance.UnrealizedMarginProfitLoss, balance.Currency) }}
                </div>
              </div>
              <div class="balance-item">
                <div class="balance-item-label">Margin Utilization</div>
                <div class="balance-item-value">{{ balance.MarginUtilizationPct?.toFixed(2) || 'N/A' }}%</div>
              </div>
              <div class="balance-item">
                <div class="balance-item-label">Open Positions</div>
                <div class="balance-item-value">{{ balance.OpenPositionsCount }}</div>
              </div>
              <div class="balance-item">
                <div class="balance-item-label">Net Positions</div>
                <div class="balance-item-value">{{ balance.NetPositionsCount }}</div>
              </div>
            </div>
          </section>

          <section class="section">
            <h2>Portfolio</h2>
            <div v-if="positions.length === 0" class="results" style="max-height: none;">
              No positions loaded yet.
            </div>

            <div v-else class="portfolio-grid">
              <article
                v-for="position in positions"
                :key="positionUic(position)"
                class="position-card"
              >
                <h3>{{ positionName(position) }}</h3>
                <p class="position-meta">
                  UIC: {{ positionUic(position) }} | Asset: {{ positionAssetType(position) }}
                </p>
                <p class="position-meta">
                  Quantity: {{ positionStockAmount(position) }}
                </p>

                <div class="position-details">
                  <div class="detail-row">
                    <span class="detail-label">Status:</span>
                    <span class="detail-value">{{ positionStatus(position) }}</span>
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Avg. Open Price:</span>
                    <span class="detail-value">{{ positionAveragePrice(position) }}</span>
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Current Price:</span>
                    <span class="detail-value">{{ positionCurrentPrice(position) }}</span>
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Exposure:</span>
                    <span class="detail-value">{{ positionExposure(position) }}</span>
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">P/L:</span>
                    <span class="detail-value" :class="Number(positionPnL(position)) >= 0 ? 'positive' : 'negative'">
                      {{ positionPnL(position) }}
                    </span>
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Trade Costs:</span>
                    <span class="detail-value">{{ positionTradeCosts(position) }}</span>
                  </div>
                </div>
                
                <div v-if="position._price" class="position-price">
                  <div class="price-item">
                    <span class="price-label">Bid:</span>
                    <span class="price-value">{{ position._price.bid ?? 'N/A' }}</span>
                  </div>
                  <div class="price-item">
                    <span class="price-label">Ask:</span>
                    <span class="price-value">{{ position._price.ask ?? 'N/A' }}</span>
                  </div>
                  <div class="price-item">
                    <span class="price-label">Mid:</span>
                    <span class="price-value">{{ position._price.mid ?? 'N/A' }}</span>
                  </div>
                </div>

                <div class="position-actions">
                  <button
                    @click="submitTrade(position, 'buy')"
                    :disabled="isActionLoading('buy', position)"
                    aria-busy="isActionLoading('buy', position)"
                  >
                    Buy
                  </button>
                  <button
                    @click="submitTrade(position, 'sell')"
                    :disabled="isActionLoading('sell', position)"
                    aria-busy="isActionLoading('sell', position)"
                    class="secondary"
                  >
                    Sell
                  </button>
                </div>
              </article>
            </div>
          </section>

          <section class="section">
            <h2>Open Orders</h2>
            <div v-if="orders.length === 0" class="results" style="max-height: none;">
              No open orders found.
            </div>

            <div v-else class="orders-list">
              <article
                v-for="order in orders"
                :key="orderId(order)"
                class="order-card"
              >
                <h3>{{ orderName(order) }}</h3>
                <p class="position-meta">
                  Order ID: {{ orderId(order) }}
                </p>
                <p class="position-meta">
                  Side: {{ orderSide(order) }}
                  | Amount: {{ orderAmount(order) }}
                </p>
                <p class="position-meta">
                  Status: {{ orderStatus(order) }}
                </p>
              </article>
            </div>
          </section>

          <section class="section">
            <h2>Recent Transactions</h2>
            <div v-if="transactions.length === 0" class="results" style="max-height: none;">
              No recent transactions found.
            </div>

            <div v-else class="transactions-list">
              <article
                v-for="transaction in transactions"
                :key="transactionId(transaction)"
                class="transaction-card"
              >
                <h3>{{ transactionName(transaction) }}</h3>
                <p class="position-meta">
                  Transaction ID: {{ transactionId(transaction) }}
                </p>
                <p class="position-meta">
                  Amount: {{ transactionAmount(transaction) }}
                  | P/L: {{ transactionPnl(transaction) }}
                </p>
                <p class="position-meta">
                  Date: {{ transactionDate(transaction) }}
                </p>
              </article>
            </div>
          </section>
        </main>
      `,
    });

    app.mount('#app');
  </script>
</body>
</html>
