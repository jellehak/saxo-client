<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - Saxo Client</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    body {
      padding: 2rem;
    }
    .section {
      background: var(--form-element-background-color);
      padding: 1.5rem;
      border-radius: var(--border-radius);
      margin-bottom: 1.5rem;
    }
    .results {
      background: var(--code-background-color);
      padding: 1rem;
      border-radius: var(--border-radius);
      font-family: monospace;
      font-size: 0.9rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 400px;
      overflow-y: auto;
    }
    nav {
      margin-bottom: 2rem;
    }
    nav a {
      margin-right: 1rem;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="importmap">
    {
      "imports": {
        "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js"
      }
    }
  </script>

  <script type="module">
    import { createApp, ref, onMounted, watch } from 'vue';
    import { createClient } from '../index.js';

    const app = createApp({
      setup() {
        const token = ref('');
        const results = ref('');
        const loading = ref(false);

        onMounted(() => {
          const savedToken = localStorage.getItem('saxo-token');
          if (savedToken) {
            token.value = savedToken;
          }
        });

        watch(token, (newToken) => {
          if (newToken) {
            localStorage.setItem('saxo-token', newToken);
          } else {
            localStorage.removeItem('saxo-token');
          }
        });

        const logResult = (data) => {
          results.value = JSON.stringify(data, null, 2);
        };

        const handleError = (error) => {
          results.value = `Error: ${error.message}`;
        };

        const handleListPortfolio = async () => {
          if (!token.value) {
            results.value = 'Please enter a Bearer token';
            return;
          }

          loading.value = true;
          try {
            const client = createClient(token.value);
            const result = await client.listPortfolio();
            logResult(result);
          } catch (error) {
            handleError(error);
          } finally {
            loading.value = false;
          }
        };

        return {
          token,
          results,
          loading,
          handleListPortfolio,
        };
      },

      template: `
        <main class="container">
          <nav>
            <a href="index.html">← Back</a>
          </nav>

          <h1>Portfolio</h1>
          <p>View your net positions and portfolio details.</p>

          <section class="section">
            <h2>Configuration</h2>
            <label>
              Bearer Token
              <input
                v-model="token"
                type="password"
                placeholder="Your Saxo API token"
              />
            </label>
          </section>

          <button
            @click="handleListPortfolio"
            :disabled="loading"
            aria-busy="loading"
          >
            Load Portfolio
          </button>

          <section class="section" style="margin-top: 1.5rem;">
            <h2>Results</h2>
            <div class="results">{{ results || 'Results will appear here...' }}</div>
          </section>
        </main>
      `,
    });

    app.mount('#app');
  </script>
</body>
</html>
